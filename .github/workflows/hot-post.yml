# MoltBridge Agent — Hot Post
# Scheduled daily at 12:00 Turkey time (09:00 UTC), one hour after heartbeat.

name: MoltBridge Hot Post

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  hot-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📂 Restore data cache
        uses: actions/cache@v4
        with:
          path: data/state/
          key: moltbridge-data-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            moltbridge-data-${{ github.ref_name }}-
            moltbridge-data-

      - name: 🧪 Run sample report
        if: github.event_name == 'workflow_dispatch'
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          MOLTBOOK_AGENT_NAME: ${{ secrets.MOLTBOOK_AGENT_NAME || 'MoltBridgeAgent' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LOG_LEVEL: INFO
        run: python src/main.py --sample-report

      - name: 🔥 Run hot post
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          MOLTBOOK_AGENT_NAME: ${{ secrets.MOLTBOOK_AGENT_NAME || 'MoltBridgeAgent' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LOG_LEVEL: INFO
        run: python src/main.py --hot-post

      - name: 💾 Save data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moltbridge-hot-post-${{ github.run_number }}
          path: |
            data/reports/
            data/analyzed/
            data/state/
          retention-days: 30

      - name: 📊 Summary
        if: success()
        run: |
          echo "## 🔥 MoltBridge Hot Post Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- Schedule: Daily 12:00 Turkey / 09:00 UTC" >> $GITHUB_STEP_SUMMARY
