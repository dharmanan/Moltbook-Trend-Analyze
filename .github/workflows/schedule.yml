name: Scheduled Workflows\n\non:\n  schedule:\n    - cron: '0 9 * * *' # Heartbeat job at 09:00 UTC\n    - cron: '0 10 * * *' # Next job at 10:00 UTC\n    - cron: '0 11 * * *' # Next job at 11:00 UTC\n    - cron: '0 12 * * *' # Next job at 12:00 UTC\n    - cron: '0 13 * * *' # Next job at 13:00 UTC\n    - cron: '0 14 * * *' # Next job at 14:00 UTC\n    - cron: '0 15 * * *' # Next job at 15:00 UTC\n\njobs:\n  Heartbeat:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Run Heartbeat job\n        run: echo 'Heartbeat job running!'\n\n  SubsequentJob1:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Run Subsequent Job 1\n        run: echo 'Subsequent job 1 running!'\n\n  SubsequentJob2:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Run Subsequent Job 2\n        run: echo 'Subsequent job 2 running!'\n\n  SubsequentJob3:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Run Subsequent Job 3\n        run: echo 'Subsequent job 3 running!'\n