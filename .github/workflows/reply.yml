# MoltBridge Agent — Reply Cycle
# Scheduled daily at 13:00 Turkey time (10:00 UTC), one hour after hot post.

name: 🦞 MoltBridge Reply

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📂 Restore data cache
        uses: actions/cache@v4
        with:
          path: data/state/
          key: moltbridge-data-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            moltbridge-data-${{ github.ref_name }}-
            moltbridge-data-

      - name: 💬 Run reply
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          MOLTBOOK_AGENT_NAME: ${{ secrets.MOLTBOOK_AGENT_NAME || 'MoltBridgeAgent' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LOG_LEVEL: INFO
        run: python src/main.py --reply

      - name: 🤝 Follow commenters
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          MOLTBOOK_AGENT_NAME: ${{ secrets.MOLTBOOK_AGENT_NAME || 'MoltBridgeAgent' }}
          LOG_LEVEL: INFO
        run: python scripts/follow_agents.py --commenters

      - name: 💾 Save data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moltbridge-reply-data-${{ github.run_number }}
          path: |
            data/state/
          retention-days: 30

      - name: 📊 Summary
        if: success()
        run: |
          echo "## 💬 MoltBridge Reply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- Schedule: Daily 13:00 Turkey / 10:00 UTC" >> $GITHUB_STEP_SUMMARY
